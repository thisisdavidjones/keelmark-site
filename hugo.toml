baseURL = 'https://keelmark.co.uk/'
languageCode = 'en-gb'
title = 'Keelmark'
theme = 'ananke'
enableRobotsTXT = true

# Keep URLs clean and product-page friendly.
canonifyURLs = false
relativeURLs = false

[pagination]
pagerSize = 6

[params]
  description = 'Practical Android apps from Keelmark: calm, focused tools for everyday routines.'
  author = 'Keelmark'
  favicon = '/icons/favicon.svg'
  site_logo = '/images/keelmark-mark.svg'
  custom_css = ['keelmark.css']
  body_classes = 'avenir bg-near-white'
  recent_posts_number = 3
  mainSections = ['products']
  date_format = '2 January 2006'
  background_color_class = 'bg-near-black'
  text_color = 'near-black'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[menu]
  [[menu.main]]
    name = 'Products'
    url = '/products/'
    weight = 10
  [[menu.main]]
    name = 'About'
    url = '/about/'
    weight = 20
  [[menu.main]]
    name = 'Support'
    url = '/support/'
    weight = 30
  [[menu.main]]
    name = 'Privacy'
    url = '/privacy/dosewise/'
    weight = 40
