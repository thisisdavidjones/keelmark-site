<link rel="preload" as="image" href="/assets/hero-sailing-keelmark.jpg">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#082B4A">
<script>
(function () {
  const KM_LINKS = [
    ["Home", "/"],
    ["Products", "/products/"],
    ["About", "/about/"],
    ["Privacy", "/privacy/"],
    ["Contact", "/contact/"]
  ];

  function makePanel() {
    let panel = document.getElementById("km-mobile-menu");
    if (panel) return panel;

    panel = document.createElement("nav");
    panel.id = "km-mobile-menu";
    panel.className = "km-mobile-menu-panel";
    panel.setAttribute("aria-label", "Mobile navigation");
    panel.setAttribute("data-open", "false");

    KM_LINKS.forEach(function (link) {
      const a = document.createElement("a");
      a.textContent = link[0];
      a.href = link[1];
      a.addEventListener("click", function () {
        panel.setAttribute("data-open", "false");
        document.querySelectorAll("[aria-controls='km-mobile-menu']").forEach(function (btn) {
          btn.setAttribute("aria-expanded", "false");
        });
      });
      panel.appendChild(a);
    });

    document.body.appendChild(panel);
    return panel;
  }

  function findOrCreateButton() {
    const existing = Array.from(document.querySelectorAll(".hextra-hamburger-menu"))
      .find(function (el) { return el.offsetParent !== null; }) ||
      document.querySelector(".hextra-hamburger-menu");

    if (existing) return existing;

    const nav = document.querySelector(".hextra-nav-container") || document.querySelector("header") || document.body;
    const button = document.createElement("button");
    button.type = "button";
    button.className = "km-mobile-menu-button";
    button.setAttribute("aria-label", "Open menu");
    button.innerHTML = "☰";
    nav.appendChild(button);
    return button;
  }

  function closeOnOutsideClick(panel, button) {
    document.addEventListener("click", function (event) {
      if (panel.getAttribute("data-open") !== "true") return;
      if (panel.contains(event.target) || button.contains(event.target)) return;
      panel.setAttribute("data-open", "false");
      button.setAttribute("aria-expanded", "false");
    });
  }

  function initKeelmarkMobileMenu() {
    const panel = makePanel();
    const button = findOrCreateButton();

    button.classList.add("km-mobile-menu-trigger");
    button.setAttribute("aria-controls", "km-mobile-menu");
    button.setAttribute("aria-expanded", "false");
    if (!button.getAttribute("aria-label")) button.setAttribute("aria-label", "Open menu");

    button.addEventListener("click", function (event) {
      if (window.innerWidth >= 768) return;
      event.preventDefault();
      event.stopPropagation();
      if (event.stopImmediatePropagation) event.stopImmediatePropagation();
      const isOpen = panel.getAttribute("data-open") === "true";
      panel.setAttribute("data-open", isOpen ? "false" : "true");
      button.setAttribute("aria-expanded", isOpen ? "false" : "true");
    }, true);

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        panel.setAttribute("data-open", "false");
        button.setAttribute("aria-expanded", "false");
      }
    });

    window.addEventListener("resize", function () {
      if (window.innerWidth >= 768) {
        panel.setAttribute("data-open", "false");
        button.setAttribute("aria-expanded", "false");
      }
    });

    closeOnOutsideClick(panel, button);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initKeelmarkMobileMenu);
  } else {
    initKeelmarkMobileMenu();
  }
})();
</script>


<script>
(function () {
  function currentTheme() {
    return document.documentElement.classList.contains("dark") ? "dark" : "light";
  }

  function setTheme(mode) {
    var root = document.documentElement;
    var isDark = mode === "dark";
    root.classList.toggle("dark", isDark);
    root.style.colorScheme = isDark ? "dark" : "light";
    try {
      localStorage.setItem("hextra-theme", mode);
      localStorage.setItem("theme", mode);
      localStorage.setItem("color-theme", mode);
    } catch (e) {}
    var btn = document.querySelector(".km-theme-toggle");
    if (btn) {
      btn.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
      btn.setAttribute("title", isDark ? "Switch to light mode" : "Switch to dark mode");
      btn.innerHTML = isDark
        ? '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4.2v2.1M12 17.7v2.1M4.2 12h2.1M17.7 12h2.1M6.3 6.3l1.5 1.5M16.2 16.2l1.5 1.5M17.7 6.3l-1.5 1.5M7.8 16.2l-1.5 1.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="3.8" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>'
        : '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.2 14.3A7.4 7.4 0 0 1 9.7 3.8 8.4 8.4 0 1 0 20.2 14.3Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>';
    }
  }

  function findNavbarRight() {
    var nav = document.querySelector(".hextra-nav-container nav") || document.querySelector(".hextra-nav-container");
    if (!nav) return null;

    var candidates = Array.from(nav.querySelectorAll("div, section"));
    var rightish = candidates
      .filter(function (el) {
        var text = (el.textContent || "").trim();
        return text.includes("Home") || text.includes("Products") || text.includes("Contact") || el.querySelector('button, a[href="/contact/"], a[href="/about/"]');
      })
      .pop();

    return rightish || nav;
  }

  function installToggle() {
    if (document.querySelector(".km-theme-toggle")) {
      setTheme(currentTheme());
      return;
    }

    var target = findNavbarRight();
    if (!target) return;

    var btn = document.createElement("button");
    btn.type = "button";
    btn.className = "km-theme-toggle";
    btn.addEventListener("click", function () {
      setTheme(currentTheme() === "dark" ? "light" : "dark");
    });

    target.appendChild(btn);
    setTheme(currentTheme());
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", installToggle);
  } else {
    installToggle();
  }
})();
</script>
