@"
name: Build and deploy Hugo site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.163.3
      TZ: Europe/London

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Install Hugo
        run: |
          echo "Installing Hugo \${HUGO_VERSION}..."
          curl -sfL --output-dir "\${{ runner.temp }}" -O "https://github.com/gohugoio/hugo/releases/download/v\${HUGO_VERSION}/hugo_extended_\${HUGO_VERSION}_linux-amd64.tar.gz"
          mkdir "\${HOME}/.local/hugo"
          tar -C "\${HOME}/.local/hugo" -xf "\${{ runner.temp }}/hugo_extended_\${HUGO_VERSION}_linux-amd64.tar.gz"
          echo "\${HOME}/.local/hugo" >> "\${GITHUB_PATH}"

      - name: Log Hugo version
        run: hugo version

      - name: Build
        run: |
          hugo build \
            --gc \
            --minify \
            --baseURL "\${{ steps.pages.outputs.base_url }}/" \
            --cacheDir "\${{ runner.temp }}/hugo_cache"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: \${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
"@ > .github\workflows\hugo.yaml