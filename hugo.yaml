baseURL: "https://keelmark.co.uk/"
title: "Keelmark"

enableRobotsTXT: true

module:
  imports:
    - path: github.com/imfing/hextra
    
markup:
  goldmark:
    renderer:
      unsafe: true

params:
  description: "Practical Android apps for everyday routines."
  favicon: favicon.ico
  page:
    width: wide
  navbar:
    width: wide
    displayTitle: false
    displayLogo: true
    logo:
      path: assets/keelmark/keelmark-horizontal.svg
      dark: assets/keelmark/keelmark-horizontal.svg
      link: /
      width: 250
      height: 75
  footer:
    width: wide
  theme:
    default: light
    displayToggle: true
  search:
    enable: false

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Products
      pageRef: /products
      weight: 2
    - name: About
      pageRef: /about
      weight: 3
    - name: Privacy
      pageRef: /privacy
      weight: 4
    - name: Contact
      pageRef: /contact
      weight: 5
