# Merge this into your existing hugo.yaml rather than blindly replacing it.
# It assumes the Hextra theme is already installed in your site.

baseURL: "https://keelmark.co.uk/"
title: "Keelmark"

enableRobotsTXT: true

module:
  imports:
    - path: github.com/imfing/hextra
    
markup:
  goldmark:
    renderer:
      unsafe: true

params:
  description: "Practical Android apps for everyday routines."
  page:
    width: wide
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: assets/keelmark-mark.svg
      dark: assets/keelmark-mark-dark.svg
      link: /
      width: 32
      height: 32
  theme:
    default: system
    displayToggle: true
  search:
    enable: true
    type: flexsearch

menu:
  main:
    - name: Home
      pageRef: /
      weight: 1
    - name: Products
      pageRef: /products
      weight: 2
    - name: About
      pageRef: /about
      weight: 3
    - name: Privacy
      pageRef: /privacy
      weight: 4
    - name: Contact
      pageRef: /contact
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
