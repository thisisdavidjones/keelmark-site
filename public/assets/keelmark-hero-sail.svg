<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
<title id="title">Abstract sailing background</title>
<desc id="desc">A calm sea, warm horizon, and abstract yacht sail used as a background image.</desc>
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#f7fbff"/>
    <stop offset="0.45" stop-color="#edf5ff"/>
    <stop offset="1" stop-color="#f9dfc4"/>
  </linearGradient>
  <linearGradient id="sea" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#dbeeff"/>
    <stop offset="0.6" stop-color="#9fb9d2"/>
    <stop offset="1" stop-color="#425b77"/>
  </linearGradient>
  <linearGradient id="sail" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#fff4e7" stop-opacity="0.92"/>
    <stop offset="0.48" stop-color="#ffffff" stop-opacity="0.58"/>
    <stop offset="1" stop-color="#f0b078" stop-opacity="0.5"/>
  </linearGradient>
  <linearGradient id="deck" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#e9edf2"/>
    <stop offset="1" stop-color="#ffffff"/>
  </linearGradient>
  <radialGradient id="sun" cx="75%" cy="43%" r="26%">
    <stop offset="0" stop-color="#fff1c8" stop-opacity="0.95"/>
    <stop offset="0.3" stop-color="#ffd8a8" stop-opacity="0.42"/>
    <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
    <feGaussianBlur stdDeviation="3"/>
  </filter>
</defs>
<rect width="1600" height="760" fill="url(#sky)"/>
